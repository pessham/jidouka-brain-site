<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6b5840" flood-opacity="0.18"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2" fill="#d8c49f" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#fbf3e5"/>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.42"/>
  <text x="92" y="92" font-size="48" font-weight="950" fill="#2d241b">第1章：自動化してよい範囲</text>
  <text x="96" y="136" font-size="24" font-weight="700" fill="#6f6254">営業フォーム自動送信ではなく、自分側の整理に使う</text>
  <line x1="92" y1="164" x2="1508" y2="164" stroke="#d9c6a8" stroke-width="4"/>
  
      
  <rect x="120" y="230" width="600" height="280" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="120" y="230" width="12" height="280" rx="6" fill="#5f7f56"/>
  <text x="152" y="274" font-size="26" font-weight="900" fill="#2d241b">おすすめする使い方</text>
  <text x="152" y="318" font-size="22" font-weight="650" fill="#6f6254">届いた問い合わせの整理</text>
<text x="152" y="352" font-size="22" font-weight="650" fill="#6f6254">対応状況の記録</text>
<text x="152" y="386" font-size="22" font-weight="650" fill="#6f6254">自社CRMへの転記</text>
<text x="152" y="420" font-size="22" font-weight="650" fill="#6f6254">下書き作成・対応漏れチェック</text>
      
  <rect x="880" y="230" width="600" height="280" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="880" y="230" width="12" height="280" rx="6" fill="#a94438"/>
  <text x="912" y="274" font-size="26" font-weight="900" fill="#2d241b">推奨しない使い方</text>
  <text x="912" y="318" font-size="22" font-weight="650" fill="#6f6254">他社フォームへの営業自動送信</text>
<text x="912" y="352" font-size="22" font-weight="650" fill="#6f6254">大量送信</text>
<text x="912" y="386" font-size="22" font-weight="650" fill="#6f6254">規約違反になるbot操作</text>
<text x="912" y="420" font-size="22" font-weight="650" fill="#6f6254">迷惑送信に見える運用</text>
      
  <rect x="230" y="630" width="1140" height="56" rx="28" fill="#4d7188"/>
  <text x="800" y="667" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">外部へ送る自動化ほど、規約・法律・相手の受け止め方を確認</text>
    
</svg>