<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6b5840" flood-opacity="0.18"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2" fill="#d8c49f" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#fbf3e5"/>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.42"/>
  <text x="92" y="92" font-size="48" font-weight="950" fill="#2d241b">第1章：3つの道具の使い分け</text>
  <text x="96" y="136" font-size="24" font-weight="700" fill="#6f6254">MCP、コード、Computer Useを役割で選ぶ</text>
  <line x1="92" y1="164" x2="1508" y2="164" stroke="#d9c6a8" stroke-width="4"/>
  
      
  <rect x="95" y="230" width="425" height="320" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="95" y="230" width="12" height="320" rx="6" fill="#4d7188"/>
  <text x="127" y="274" font-size="26" font-weight="900" fill="#2d241b">Playwright MCP</text>
  <text x="127" y="318" font-size="22" font-weight="650" fill="#6f6254">AIにブラウザを</text>
<text x="127" y="352" font-size="22" font-weight="650" fill="#6f6254">見せながら試す</text>
<text x="127" y="386" font-size="22" font-weight="650" fill="#6f6254">初回確認・1回作業向き</text>
      
  <rect x="588" y="230" width="425" height="320" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="588" y="230" width="12" height="320" rx="6" fill="#5f7f56"/>
  <text x="620" y="274" font-size="26" font-weight="900" fill="#2d241b">Playwrightコード</text>
  <text x="620" y="318" font-size="22" font-weight="650" fill="#6f6254">繰り返し作業を</text>
<text x="620" y="352" font-size="22" font-weight="650" fill="#6f6254">手順書として固定</text>
<text x="620" y="386" font-size="22" font-weight="650" fill="#6f6254">毎日使う本命</text>
      
  <rect x="1080" y="230" width="425" height="320" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="1080" y="230" width="12" height="320" rx="6" fill="#a94438"/>
  <text x="1112" y="274" font-size="26" font-weight="900" fill="#2d241b">Computer Use</text>
  <text x="1112" y="318" font-size="22" font-weight="650" fill="#6f6254">普通の方法で</text>
<text x="1112" y="352" font-size="22" font-weight="650" fill="#6f6254">届かない時の手段</text>
<text x="1112" y="386" font-size="22" font-weight="650" fill="#6f6254">最初から使わない</text>
      
  <rect x="260" y="655" width="1080" height="56" rx="28" fill="#c39a54"/>
  <text x="800" y="692" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">迷ったら MCP → コード → 最後に Computer Use</text>
    
</svg>