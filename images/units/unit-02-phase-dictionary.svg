<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#102033" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#fffaf1"/>
      <stop offset="0.55" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#fff7ee"/>
    </linearGradient>
    <style>
      .title{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;font-weight:900;fill:#0d3558;}
      .sub{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;font-weight:760;fill:#27384c;}
      .body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;font-weight:720;fill:#1f2f44;}
      .small{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;font-weight:680;fill:#536173;}
      .head{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;font-weight:900;fill:#fff;}
    </style>
  </defs>
  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="800" y="82" text-anchor="middle" font-size="54" class="title">第2章は「辞書として使う章」です</text>
  <text x="800" y="128" text-anchor="middle" font-size="25" class="sub">最初から全部読まなくて大丈夫。詰まったとき、迷ったときに戻ってくる場所です。</text>
  <line x1="190" y1="160" x2="1410" y2="160" stroke="#bfd0e3" stroke-width="4" stroke-dasharray="12 10"/>

  <rect x="80" y="190" width="1440" height="102" rx="18" fill="#0d3558" filter="url(#shadow)"/>
  <text x="170" y="254" font-size="30" class="head">フェーズ</text>
  <text x="470" y="254" font-size="30" class="head">目的</text>
  <text x="960" y="254" font-size="30" class="head">完了ライン</text>

  <g filter="url(#shadow)">
    <rect x="80" y="318" width="1440" height="132" rx="18" fill="#ffffff" stroke="#cfddea" stroke-width="3"/>
    <circle cx="160" cy="384" r="42" fill="#2b6da8"/><text x="160" y="398" text-anchor="middle" font-size="36" class="head">1</text>
    <text x="226" y="372" font-size="30" class="title">Phase 1　録画する</text>
    <text x="226" y="412" font-size="22" class="small">まず作業を見せる</text>
    <text x="470" y="382" font-size="27" class="body">自分の作業をAIに見せる</text>
    <text x="960" y="382" font-size="27" class="body">AIが作業の流れを説明できる状態</text>
  </g>
  <path d="M800 454v34" stroke="#c39a54" stroke-width="8" stroke-linecap="round"/><path d="M800 500l-18-26h36z" fill="#c39a54"/>

  <g filter="url(#shadow)">
    <rect x="80" y="500" width="1440" height="132" rx="18" fill="#f8fbff" stroke="#cfddea" stroke-width="3"/>
    <circle cx="160" cy="566" r="42" fill="#4f7d59"/><text x="160" y="580" text-anchor="middle" font-size="36" class="head">2</text>
    <text x="226" y="554" font-size="30" class="title">Phase 2　コード化する</text>
    <text x="226" y="594" font-size="22" class="small">最小版を作る</text>
    <text x="470" y="564" font-size="27" class="body">AIにスクリプトを作ってもらう</text>
    <text x="960" y="552" font-size="27" class="body">最小版コードが実行できる</text>
    <text x="960" y="590" font-size="27" class="body">準備が整った状態</text>
  </g>
  <path d="M800 636v34" stroke="#c39a54" stroke-width="8" stroke-linecap="round"/><path d="M800 682l-18-26h36z" fill="#c39a54"/>

  <g filter="url(#shadow)">
    <rect x="80" y="682" width="1440" height="132" rx="18" fill="#ffffff" stroke="#cfddea" stroke-width="3"/>
    <circle cx="160" cy="748" r="42" fill="#d95836"/><text x="160" y="762" text-anchor="middle" font-size="36" class="head">3</text>
    <text x="226" y="736" font-size="30" class="title">Phase 3　動かして直す</text>
    <text x="226" y="776" font-size="22" class="small">エラーを材料にする</text>
    <text x="470" y="746" font-size="27" class="body">エラーをAIに渡して修正する</text>
    <text x="960" y="746" font-size="27" class="body">最小版が最後まで通して動いた状態</text>
  </g>
  <path d="M800 818v34" stroke="#c39a54" stroke-width="8" stroke-linecap="round"/><path d="M800 864l-18-26h36z" fill="#c39a54"/>

  <g filter="url(#shadow)">
    <rect x="80" y="864" width="1440" height="92" rx="18" fill="#fff7e7" stroke="#e0c58d" stroke-width="3"/>
    <circle cx="160" cy="910" r="34" fill="#c39a54"/><text x="160" y="922" text-anchor="middle" font-size="30" class="head">4</text>
    <text x="226" y="920" font-size="28" class="title">Phase 4　再開できる設計にする</text>
    <text x="620" y="920" font-size="25" class="body">途中で止まっても戻れるようにする</text>
    <text x="1090" y="920" font-size="25" class="body">途中停止しても怖くない状態</text>
  </g>

  <rect x="80" y="162" width="250" height="52" rx="26" fill="#e8f0ff" stroke="#2b6da8" stroke-width="3"/>
  <text x="205" y="197" text-anchor="middle" font-size="24" class="title">4フェーズの全体像</text>
</svg>
