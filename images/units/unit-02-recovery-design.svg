<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#6b5840" flood-opacity="0.18"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2" fill="#d8c49f" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#fbf3e5"/>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.42"/>
  <text x="92" y="92" font-size="48" font-weight="950" fill="#2d241b">第2章：壊れても戻れる設計</text>
  <text x="96" y="136" font-size="24" font-weight="700" fill="#6f6254">毎日使うなら、失敗後の動きまで作る</text>
  <line x1="92" y1="164" x2="1508" y2="164" stroke="#d9c6a8" stroke-width="4"/>
  
      
  <rect x="105" y="240" width="410" height="260" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="105" y="240" width="12" height="260" rx="6" fill="#4d7188"/>
  <text x="137" y="284" font-size="26" font-weight="900" fill="#2d241b">ブラウザを閉じない</text>
  <text x="137" y="328" font-size="22" font-weight="650" fill="#6f6254">止まった画面を確認</text>
<text x="137" y="362" font-size="22" font-weight="650" fill="#6f6254">手動で原因を見る</text>
      
  <rect x="595" y="240" width="410" height="260" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="595" y="240" width="12" height="260" rx="6" fill="#5f7f56"/>
  <text x="627" y="284" font-size="26" font-weight="900" fill="#2d241b">途中から再開</text>
  <text x="627" y="328" font-size="22" font-weight="650" fill="#6f6254">完了済みはスキップ</text>
<text x="627" y="362" font-size="22" font-weight="650" fill="#6f6254">二重実行を防ぐ</text>
      
  <rect x="1085" y="240" width="410" height="260" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="1085" y="240" width="12" height="260" rx="6" fill="#c39a54"/>
  <text x="1117" y="284" font-size="26" font-weight="900" fill="#2d241b">ログとスクショ</text>
  <text x="1117" y="328" font-size="22" font-weight="650" fill="#6f6254">何が起きたか残す</text>
<text x="1117" y="362" font-size="22" font-weight="650" fill="#6f6254">相談材料になる</text>
      
  <rect x="245" y="635" width="1110" height="56" rx="28" fill="#a94438"/>
  <text x="800" y="672" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">完成度100%より、止まっても復帰できることを優先</text>
    
