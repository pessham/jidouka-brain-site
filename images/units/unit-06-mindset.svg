<text x="622" y="342" font-size="22" font-weight="650" fill="#6f6254">翌日に見直す</text>
      
  <rect x="1080" y="220" width="420" height="230" rx="18" fill="#fffaf0" stroke="#d9c6a8" stroke-width="3"/>
  <rect x="1080" y="220" width="12" height="230" rx="6" fill="#5f7f56"/>
  <text x="1112" y="264" font-size="26" font-weight="900" fill="#2d241b">80%でいい</text>
  <text x="1112" y="308" font-size="22" font-weight="650" fill="#6f6254">最後だけ手動でもOK</text>
<text x="1112" y="342" font-size="22" font-weight="650" fill="#6f6254">半自動化にも価値がある</text>
      
  <rect x="245" y="615" width="1110" height="56" rx="28" fill="#a94438"/>
  <text x="800" y="652" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">完璧より、続けられることを優先する</text>
    
