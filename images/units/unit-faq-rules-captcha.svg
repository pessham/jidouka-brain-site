  <rect x="250" y="650" width="1100" height="56" rx="28" fill="#c39a54"/>
  <text x="800" y="687" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">ログインと認証は人間、ログイン後の定型作業は自動化</text>
    
